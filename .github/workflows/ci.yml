name: CI
 
on:
  push:
    branches: [ main, master, bug ]
  pull_request:
 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
 
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
 
      - name: Install dependencies
        run: npm install
 
      - name: Verify worker.mjs exists
        run: |
          if [ ! -f "public/worker.mjs" ]; then
            echo "::error::public/worker.mjs 不存在，Issue #2 regression"
            exit 1
          fi
 
      - name: Run unit tests
        run: npm run test
 
      - name: Build
        run: npm run build
 
  e2e:
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
 
      - name: Install dependencies
        run: npm install
 
      - name: Build
        run: npm run build
 
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
 
      - name: Run E2E tests
        run: npx playwright test --reporter=dot,junit,html
 
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
 
      - name: Upload Playwright test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results